<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <h1>🎰 Slot Machine</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <!-- GAME -->
  <div class="container" id="game" style="display:none;">
    <h1 class="title">🎰 Slot Machine</h1>

    <div class="top-bar">
      <div class="balance">Coins: <span id="coins">0</span></div>
      <button id="logoutBtn">Logout</button>
    </div>

    <button class="bonus-button" id="bonusBtn">Claim Daily Bonus</button>

    <div class="slot-machine">
      <div class="reel"></div>
      <div class="reel"></div>
      <div class="reel"></div>
    </div>

    <button class="spin-button">SPIN</button>

    <div class="result" id="result">Try your luck!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
