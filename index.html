<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">

    <button id="signupBtn" class="top-right-btn">Sign Up</button>

    <div class="login-box">
      <h1>🎰 Slot Machine</h1>

      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">

      <button id="loginBtn" class="primary-btn">Login</button>
    </div>
  </div>

  <!-- GAME -->
  <div class="container" id="game" style="display:none;">

    <button id="logoutBtn" class="top-right-btn">Logout</button>

    <button id="bonusBtn" class="bonus-btn">🎁 Daily Bonus</button>

    <div class="game-card">

      <div class="balance">Coins: <span id="coins">0</span></div>

      <!-- BET -->
      <div class="bet-container">
        <span>Bet:</span>
        <input type="number" id="betInput" value="50" min="25" step="25">
      </div>

      <div class="slot-machine">
        <div class="reel"></div>
        <div class="reel"></div>
        <div class="reel"></div>
      </div>

      <button class="spin-button">SPIN</button>

      <div class="result" id="result">Try your luck!</div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
