<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1 class="title">🎰 Slot Machine</h1>

    <div class="balance">Coins: <span id="coins">500</span></div>

    <div class="slot-machine">
      <div class="reel">
        <div class="symbol">🍒</div>
      </div>

      <div class="reel">
        <div class="symbol">🍋</div>
      </div>

      <div class="reel">
        <div class="symbol">🍊</div>
      </div>
    </div>

    <button class="spin-button">SPIN</button>

    <div class="result" id="result">Try your luck!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
